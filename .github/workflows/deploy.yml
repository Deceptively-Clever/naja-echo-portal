name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/najaecho-api" >> $GITHUB_ENV

      # ── Backend image ────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend bundle ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package frontend dist
        run: tar -C frontend/dist -czf frontend-dist.tar.gz .

      # ── EF migration bundle ──────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore NuGet packages
        working-directory: backend
        run: dotnet restore src/NajaEcho.Api/NajaEcho.Api.csproj

      - name: Build EF migration bundle
        working-directory: backend
        run: |
          dotnet ef migrations bundle \
            --project src/NajaEcho.Infrastructure/NajaEcho.Infrastructure.csproj \
            --startup-project src/NajaEcho.Api/NajaEcho.Api.csproj \
            --configuration Release \
            --self-contained \
            -r linux-x64 \
            -o ../efbundle \
            --force

      # ── Ship to VM ───────────────────────────────────────────────────
      - name: Copy artifacts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   "efbundle,frontend-dist.tar.gz"
          target:   "/tmp/najaecho-deploy"
          rm:       true

      - name: Run deploy script on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo /opt/najaecho/deploy.sh ${{ github.sha }}
