openapi: 3.0.3
info:
  title: NajaEchoPortal Admin — Ship Data Import API
  version: 0.1.0
  description: |
    REST endpoints for the admin-only ship data import feature (`006-ship-data-import`). The backend owns
    the integration with the external UEX Corp vehicle feed (`https://api.uexcorp.uk/2.0/vehicles`); the
    SPA never calls UEX directly (Constitution III).

    Contract invariants:
      - All endpoints under `/api/admin/**` require an authenticated session whose principal holds the
        `Admin` role. Unauthenticated → 401; authenticated-but-not-admin → 403.
      - Importing is server-side, transactional, and all-or-nothing (FR-005). A single-flight lock allows
        only one import at a time (FR-003); a concurrent attempt returns 409.
      - Ship records are read-only — there are no create/update/delete endpoints for individual ships.

    This file also documents the additive `roles` field added to the existing `/api/auth/me` response
    (owned by feature 002) so the SPA can gate admin UI. The canonical auth contract remains
    `specs/002-identity-refactor/contracts/openapi.yaml`; the `roles` addition there must match the
    `SessionRoles` shape below.
servers:
  - url: http://localhost:5080
    description: Local development
  - url: https://api.example.invalid
    description: Production (placeholder)

tags:
  - name: admin-ships
    description: Admin-only ship data import, listing, and detail.
  - name: auth
    description: Session probe extension for role-based UI gating.

paths:
  /api/admin/ships:
    get:
      tags: [admin-ships]
      summary: List imported ship records (paginated).
      description: |
        Returns a page of imported ships ordered by name. Includes both active and soft-deleted records;
        `status` distinguishes them (FR-010). Drives the data table (FR-006) and the empty state (FR-007).
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: 1-based page number.
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
          description: Records per page (default 25).
      responses:
        '200':
          description: A page of ship records (possibly empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PagedShips' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/admin/ships/{id}:
    get:
      tags: [admin-ships]
      summary: Get the full record for a single ship.
      description: |
        Returns the complete, verbatim set of feed fields for one ship (all 64 fields) plus its status,
        powering the right-side detail sheet (FR-008, US3). Fields with no value are present and empty so
        the full data shape is visible.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: The ship's local surrogate id (not the UEX id).
      responses:
        '200':
          description: The ship's full detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: No ship with that id.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /api/admin/ships/import:
    post:
      tags: [admin-ships]
      summary: Trigger a ship data import from the UEX feed.
      description: |
        Fetches the full UEX vehicle feed server-side and performs a transactional upsert: inserts new
        ships, updates existing ones, reactivates previously soft-deleted ships that reappear (FR-011),
        and soft-deletes ships absent from the feed (FR-009). All-or-nothing: any failure rolls back and
        leaves stored data unchanged (FR-005). If the feed returns zero records, no changes are made and
        a warning is returned. Only one import may run at a time (FR-003).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: No body required; reserved for future per-source options.
      responses:
        '200':
          description: Import completed; counts of what changed (FR-004).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResult' }
        '202':
          description: |
            Feed returned zero records — no changes applied (edge case). Body carries a warning message and
            zeroed counts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: An import is already in progress (FR-003).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '502':
          description: The external UEX feed was unavailable or returned an unusable response (FR-005); no changes applied.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /api/auth/me:
    get:
      tags: [auth]
      summary: Session probe (extended with roles).
      description: |
        Documented here only for the additive `roles` field this feature adds to the authenticated
        response. Always returns 200 (session probe never 401s). See the 002 auth contract for the full
        definition; the authenticated payload gains `user.roles: string[]`.
      responses:
        '200':
          description: Current session state, including roles when authenticated.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthenticatedSessionWithRoles'
                  - $ref: '#/components/schemas/AnonymousSession'

components:
  schemas:
    ShipStatus:
      type: string
      enum: [active, softDeleted]
      description: active = present in the latest feed (or reactivated); softDeleted = absent from the latest feed.

    ShipListItem:
      type: object
      required: [id, name, status]
      properties:
        id: { type: string, format: uuid, description: Local surrogate id. }
        name: { type: string, example: "100i" }
        companyName: { type: string, nullable: true, example: "Origin Jumpworks" }
        status: { $ref: '#/components/schemas/ShipStatus' }

    PagedShips:
      type: object
      required: [items, page, pageSize, totalCount, totalPages]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ShipListItem' }
        page: { type: integer, example: 1 }
        pageSize: { type: integer, example: 25 }
        totalCount: { type: integer, example: 278 }
        totalPages: { type: integer, example: 12 }

    ShipDetail:
      type: object
      required: [id, status, fields]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/ShipStatus' }
        fields:
          type: object
          additionalProperties: true
          description: |
            Verbatim map of all feed fields for the ship (all 64 keys from the UEX record), stored as-is
            (e.g. is_* flags as 0/1, dates as unix timestamps, some numbers as strings). Rendered read-only
            in the detail sheet; empty values are present and shown explicitly.

    ImportResult:
      type: object
      required: [added, updated, reactivated, softDeleted, total]
      properties:
        added: { type: integer, description: New ships inserted this run. }
        updated: { type: integer, description: Existing active ships refreshed this run. }
        reactivated: { type: integer, description: Previously soft-deleted ships brought back (FR-011). }
        softDeleted: { type: integer, description: Ships absent from the feed, soft-deleted this run (FR-009). }
        total: { type: integer, description: Total ship records active after the run / records in the feed. }
        warning:
          type: string
          nullable: true
          description: Set when the feed returned zero records and no changes were applied.

    SessionRoles:
      type: array
      items: { type: string }
      example: ["Admin"]
      description: Role names held by the signed-in user; drives admin UI gating.

    AuthenticatedSessionWithRoles:
      type: object
      required: [authenticated, user]
      properties:
        authenticated: { type: boolean, enum: [true] }
        user:
          type: object
          required: [id, displayName, discordUsername, roles]
          properties:
            id: { type: string, format: uuid }
            displayName: { type: string }
            discordUsername: { type: string }
            roles: { $ref: '#/components/schemas/SessionRoles' }

    AnonymousSession:
      type: object
      required: [authenticated]
      properties:
        authenticated: { type: boolean, enum: [false] }

    ProblemDetails:
      type: object
      description: RFC 7807 problem document (as emitted by the API's ProblemDetails middleware).
      properties:
        title: { type: string }
        status: { type: integer }
        detail: { type: string, nullable: true }
        instance: { type: string, nullable: true }

  responses:
    Unauthorized:
      description: No authenticated session.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Forbidden:
      description: Authenticated but lacking the Admin role.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
